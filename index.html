<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 2 — Arrays &amp; Linked Lists · Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060a10;--surface:#0d1520;--card:#111a27;--border:#1e2d40;
  --text:#e8eef6;--muted:#5a7490;--accent:#c084fc;
  --green:#22d46b;--red:#ff4e4e;--yellow:#f0c040;
  --t-color:#34d399;--tr-color:#fb923c;--c-color:#818cf8;--tt-color:#f472b6;
  --radius:14px;--transition:.2s ease;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  background-image:radial-gradient(circle at 15% 30%,rgba(192,132,252,.05) 0%,transparent 50%),
                   radial-gradient(circle at 85% 70%,rgba(52,211,153,.04) 0%,transparent 50%);
}
header{
  position:sticky;top:0;z-index:100;
  background:rgba(6,10,16,.92);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:14px 28px;display:flex;align-items:center;gap:20px;
}
.hdr-title{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;
  color:var(--accent);letter-spacing:2px;text-transform:uppercase;white-space:nowrap;}
.hdr-counter{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);
  margin-left:auto;white-space:nowrap;}
.progress-wrap{flex:1;max-width:500px;height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--t-color));
  border-radius:4px;transition:width .4s ease;width:0%}
.score-pill{display:flex;align-items:center;gap:8px;background:var(--surface);
  border:1px solid var(--border);border-radius:50px;padding:6px 16px;
  font-size:13px;color:var(--muted);white-space:nowrap;}
.score-num{font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace}
main{max-width:860px;margin:0 auto;padding:32px 20px 80px}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:32px 36px;animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.q-meta{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.q-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
.badge{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:4px 10px;border-radius:50px;border:1px solid;}
.badge-T{color:var(--t-color);border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.08)}
.badge-TR{color:var(--tr-color);border-color:rgba(251,146,60,.3);background:rgba(251,146,60,.08)}
.badge-C{color:var(--c-color);border-color:rgba(129,140,248,.3);background:rgba(129,140,248,.08)}
.badge-TT{color:var(--tt-color);border-color:rgba(244,114,182,.3);background:rgba(244,114,182,.08)}
.q-text{font-family:'Crimson Pro',Georgia,serif;font-size:20px;line-height:1.65;
  color:var(--text);margin-bottom:26px;}
.q-code{display:block;font-family:'JetBrains Mono',monospace;font-size:13px;
  background:#07111d;border:1px solid var(--border);border-left:3px solid var(--accent);
  border-radius:8px;padding:14px 18px;margin:14px 0;line-height:1.9;
  color:#c4b5fd;white-space:pre;overflow-x:auto;}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.opt{display:flex;align-items:flex-start;gap:14px;background:var(--surface);
  border:1.5px solid var(--border);border-radius:10px;padding:14px 18px;cursor:pointer;
  transition:var(--transition);font-size:15px;line-height:1.5;
  font-family:'DM Sans',sans-serif;text-align:left;color:var(--text);}
.opt:hover:not(.disabled){border-color:var(--accent);background:#120e1e}
.opt-letter{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
  color:var(--muted);min-width:20px;padding-top:2px;}
.opt.correct{border-color:var(--green)!important;background:rgba(34,212,107,.08)!important}
.opt.wrong{border-color:var(--red)!important;background:rgba(255,78,78,.08)!important}
.opt.correct .opt-letter{color:var(--green)}
.opt.wrong .opt-letter{color:var(--red)}
.opt.disabled{cursor:default}
.opt .opt-code{font-family:'JetBrains Mono',monospace;font-size:12px;display:block;
  margin-top:4px;color:#a5b4fc;white-space:pre;line-height:1.7}
.feedback{border-radius:8px;padding:12px 16px;font-size:14px;line-height:1.5;
  margin-bottom:22px;display:none;}
.feedback.correct{background:rgba(34,212,107,.1);border:1px solid rgba(34,212,107,.3);color:#7de8a8}
.feedback.wrong{background:rgba(255,78,78,.1);border:1px solid rgba(255,78,78,.3);color:#ff9090}
.nav{display:flex;justify-content:space-between;align-items:center}
.btn{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
  padding:11px 26px;border-radius:8px;cursor:pointer;border:1.5px solid;transition:var(--transition);}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#060a10}
.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:disabled,.btn:disabled{opacity:.35;cursor:not-allowed;filter:none}
#results{display:none;animation:slideIn .4s ease}
.res-hero{text-align:center;padding:48px 0 36px}
.res-arc{position:relative;width:160px;height:160px;margin:0 auto 24px}
.res-arc svg{transform:rotate(-90deg)}
.arc-bg{fill:none;stroke:var(--border);stroke-width:12}
.arc-fill{fill:none;stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset 1s ease}
.res-pct{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;}
.res-pct-num{font-size:32px;font-weight:700;color:var(--accent)}
.res-pct-label{font-size:11px;color:var(--muted);letter-spacing:1px}
.res-grade{font-size:48px;font-weight:700;margin-bottom:6px}
.res-msg{font-size:16px;color:var(--muted);margin-bottom:6px}
.res-score{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--accent)}
.breakdown{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px 28px;margin-bottom:24px;}
.breakdown h3{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
.cat-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.cat-name{font-size:13px;min-width:180px}
.cat-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:3px;transition:width 1s ease}
.cat-score{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);min-width:55px;text-align:right}
.btn-restart{display:block;margin:0 auto;font-family:'JetBrains Mono',monospace;
  font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:14px 36px;background:transparent;border:1.5px solid var(--accent);
  color:var(--accent);border-radius:8px;cursor:pointer;transition:var(--transition);}
.btn-restart:hover{background:var(--accent);color:#060a10}
</style>
</head>
<body>
<header>
  <div class="hdr-title">CH.2 · Arrays &amp; Linked Lists</div>
  <div class="progress-wrap"><div class="progress-bar" id="prog"></div></div>
  <div class="hdr-counter" id="counter">1 / 100</div>
  <div class="score-pill">Score <span class="score-num" id="scoreDisplay">0</span>/100</div>
</header>
<main>
  <div id="quiz"></div>
  <div id="results">
    <div class="res-hero">
      <div class="res-arc">
        <svg width="160" height="160" viewBox="0 0 160 160">
          <circle class="arc-bg" cx="80" cy="80" r="68"/>
          <circle class="arc-fill" id="arcFill" cx="80" cy="80" r="68"
            stroke-dasharray="427.26" stroke-dashoffset="427.26"/>
        </svg>
        <div class="res-pct">
          <span class="res-pct-num" id="resPct">0%</span>
          <span class="res-pct-label">SCORE</span>
        </div>
      </div>
      <div class="res-grade" id="resGrade">—</div>
      <div class="res-msg" id="resMsg"></div>
      <div class="res-score" id="resScore"></div>
    </div>
    <div class="breakdown">
      <h3>Category Breakdown</h3>
      <div id="catBreakdown"></div>
    </div>
    <button class="btn-restart" onclick="restart()">↺ RESTART QUIZ</button>
  </div>
</main>
<script>
const Q=[
// ── THEORETICAL (15) ─────────────────────────────────────────────────
{t:"T",q:"In a singly linked list, each node consists of:",
 o:["Data part only","Address part only","Data part + Address part","Two data parts"],a:2},
{t:"T",q:"The last node in a singly linked list must have which value in its address part?",
 o:["The address of the first node","NULL","Zero (0)","The address of the previous node"],a:1},
{t:"T",q:"To keep track of a linked list at all times, you must know:",
 o:["The total size of the list","The pointer to the first element (head)","The last element's data value","The middle element's address"],a:1},
{t:"T",q:"In a <strong>doubly linked list</strong>, how many NULL pointer values exist in the entire list?",
 o:["One (only at the last node)","Two (one at the first node, one at the last node)","None — all nodes are connected","One at the first node only"],a:1},
{t:"T",q:"In a <strong>circular linked list</strong>, the last node's address part points to:",
 o:["NULL","The last node itself","The first node (head)","The second node"],a:2},
{t:"T",q:"How do we know when we have <em>finished traversing</em> a circular linked list?",
 o:["temp == NULL","temp.next == NULL","temp.next == head","temp.data == head.data"],a:2},
{t:"T",q:"Which type of linked list allows traversal in <strong>both forward and backward</strong> directions?",
 o:["Singly linked list","Circular linked list","Doubly linked list","Singly circular linked list"],a:2},
{t:"T",q:"In a doubly linked list, we usually maintain two pointers to track the list. These are named:",
 o:["head and temp","head and tail","first and last","prev and next"],a:1},
{t:"T",q:"<em>Traversing</em> a linked list is defined as:",
 o:["Deleting each node sequentially","Visiting each node exactly once for a certain purpose","Sorting the nodes in order","Counting only the data values"],a:1},
{t:"T",q:"Which of the following is a key <strong>advantage</strong> of a linked list over an array?",
 o:["Provides direct (random) access","Uses less memory per element than arrays","Dynamic size — can grow or shrink during execution","Faster element access time"],a:2},
{t:"T",q:"An array of size N is indexed from:",
 o:["1 to N","0 to N","0 to N−1","1 to N−1"],a:2},
{t:"T",q:"Which array disadvantage occurs when you declare an array of 50 elements but only use 10?",
 o:["Fixed-size overflow","Memory wastage — the other 40 slots cannot be used by other variables","Slow direct access","Index-out-of-bounds error"],a:1},
{t:"T",q:"When inserting into a <strong>sorted array</strong>, what operation is required on existing elements?",
 o:["Reconnecting pointers","Shifting elements to make room","Rebuilding the entire array","Resizing the array first"],a:1},
{t:"T",q:"Which type of linked list has BOTH <em>next</em> and <em>prev</em> pointers in each node AND the last node's next points back to the first node?",
 o:["Singly linked list","Doubly linked list","Circular linked list","Doubly circular linked list"],a:3},
{t:"T",q:"Backtracking (moving backward) in a <strong>singly linked list</strong> is:",
 o:["Easy using the single pointer","Difficult compared to arrays","Impossible in all cases","The same speed as in arrays"],a:1},

// ── TRACING (35) ─────────────────────────────────────────────────────
{t:"TR",q:"Linked list: head→[10|next]→[20|next]→[30|null]. Execute: <code>temp=head; temp=temp.next; temp=temp.next</code>. What is <strong>temp.data</strong>?",
 o:["10","20","30","null"],a:2},
{t:"TR",q:"Traversal pseudocode on list head→[5]→[10]→[15]→null:<pre class='q-code'>temp = head\nWhile (temp != null)\n   Print(temp.data)\n   temp = temp.next</pre>What value is printed <strong>last</strong>?",
 o:["5","10","15","null"],a:2},
{t:"TR",q:"Insertion at top: list is head→[48]→[17]→[142]→null. New node has data=99.<pre class='q-code'>new.next = head\nhead = new</pre>After execution, what is <strong>head.data</strong>?",
 o:["48","17","99","142"],a:2},
{t:"TR",q:"Execute this traversal on list head→[6]→[4]→[17]→[42]→null:<pre class='q-code'>temp = head\nWhile (temp.next != null)\n   Last = temp\n   temp = temp.next</pre>What is <strong>temp.data</strong> when the loop exits?",
 o:["6","17","42","4"],a:2},
{t:"TR",q:"Using the same traversal as the previous question on head→[6]→[4]→[17]→[42]→null, what is <strong>Last.data</strong> when the loop exits?",
 o:["17","42","4","6"],a:0},
{t:"TR",q:"List: head→[A]→[B]→[C]→null. Execute: <code>head = head.next</code>. What is the new <strong>head.data</strong>?",
 o:["A","B","C","null"],a:1},
{t:"TR",q:"Delete from top of list head→[6]→[4]→[17]→[42]→null:<pre class='q-code'>temp = head\nhead = temp.next\nfree(temp)</pre>What is the new <strong>head.data</strong>?",
 o:["6","4","17","42"],a:1},
{t:"TR",q:"Insert in the middle: list head→[48]→[17]→[142]→null. temp points to node 17. New node data=93.<pre class='q-code'>new.next = temp.next\ntemp.next = new</pre>After execution, node 17's next points to data:",
 o:["48","142","93","null"],a:2},
{t:"TR",q:"After the insertion in the previous question (inserting 93 between 17 and 142), node <strong>93</strong>'s next pointer points to data:",
 o:["17","48","null","142"],a:3},
{t:"TR",q:"Traversal of list [10]→[20]→[30]→[40]→null using <code>while(temp!=null)</code>. How many times does the while condition evaluate to <strong>TRUE</strong>?",
 o:["3","4","5","2"],a:1},
{t:"TR",q:"Array: <code>int[]scores = new int[10]</code>. Using 0-based indexing, valid indices range from:",
 o:["1 to 10","0 to 9","0 to 10","1 to 9"],a:1},
{t:"TR",q:"List: head→[5]→[10]→[15]→null. Execute: <code>new.data=1; new.next=head; head=new</code>. After insertion, what is the order from head?",
 o:["5,1,10,15","1,5,10,15","5,10,15,1","10,5,1,15"],a:1},
{t:"TR",q:"Delete from end with list head→[6]→[4]→[17]→null. After loop exits, execute: <code>last.next=null; free(temp)</code>. What does node 4's next pointer now point to?",
 o:["17","null","6","4"],a:1},
{t:"TR",q:"Insert in middle: temp points to node 17 in head→[48]→[17]→[142]→null. Execute: <code>new.next=temp.next; temp.next=new</code> (new.data=93). What is head.next.next.data?",
 o:["17","93","142","48"],a:1},
{t:"TR",q:"Array scores (0-indexed): [79, 87, 94, 82, 67, 98, 87, 81, 74, 91]. What is <strong>scores[5]</strong>?",
 o:["67","98","87","82"],a:1},
{t:"TR",q:"Delete from top twice on list head→[10]→[20]→[30]→null. After both deletions, what is <strong>head.data</strong>?",
 o:["10","20","30","null"],a:2},
{t:"TR",q:"Insertion at end into list head→[1]→[2]→[3]→null (inserting data=4).<pre class='q-code'>temp = head\nWhile (temp.next != null)\n   temp = temp.next\ntemp.next = new\nnew.next = null</pre>How many times does the while loop body execute?",
 o:["1","2","3","4"],a:1},
{t:"TR",q:"Traversal of head→[3]→[1]→[4]→[1]→[5]→null, printing each node. What is the <strong>3rd value</strong> printed?",
 o:["3","1","4","5"],a:2},
{t:"TR",q:"Delete from end of list head→[10]→[20]→null. After the delete-end pseudocode runs, what is <strong>Last.data</strong>?",
 o:["10","20","null","30"],a:0},
{t:"TR",q:"After deleting the last node from head→[10]→[20]→null (previous question), what does node 10's next pointer point to?",
 o:["20","null","10","head"],a:1},
{t:"TR",q:"List head→[5]→[10]→[15]→[20]→null. Traversal runs: temp=head; while(temp!=null){print; temp=temp.next}. How many times is <code>temp=temp.next</code> executed?",
 o:["3","4","5","2"],a:1},
{t:"TR",q:"Insert at top with data=50 onto head→[100]→[200]→null. Execute: new.data=50; new.next=head; head=new. What does new.next.data equal?",
 o:["null","50","100","200"],a:2},
{t:"TR",q:"Singly linked list: node at 4800 has data=10 (next=4900), node at 4900 has data=15 (next=5000), node at 5000 has data=5 (next=null). head=4800. Reading from head, the sequence is:",
 o:["5, 15, 10","10, 5, 15","10, 15, 5","15, 10, 5"],a:2},
{t:"TR",q:"Delete from middle: list head→[1]→[2]→[3]→[4]→null. Delete node 3. prev points to node 2, temp points to node 3. Execute: <code>prev.next = temp.next</code>. Node 2's next now points to data:",
 o:["3","null","4","1"],a:2},
{t:"TR",q:"Array A (1-indexed): A = [2, 7, 4, 1, 5, 6]. What is <strong>A[3]</strong>?",
 o:["2","7","4","1"],a:2},
{t:"TR",q:"List head→[A]→[B]→[C]→[D]→null. How many <strong>non-null next pointers</strong> exist in this list?",
 o:["3","4","5","2"],a:1},
{t:"TR",q:"Insert at end into a <strong>single-node</strong> list: head→[10]→null. Insert data=20. In the traversal <code>while(temp.next!=null)</code>, how many iterations run before exiting?",
 o:["0","1","2","3"],a:0},
{t:"TR",q:"Doubly linked list: null←[5]↔[7]↔[9]→null (tail=9). Starting from <strong>tail</strong> and following prev pointers, the sequence is:",
 o:["5, 7, 9","9, 5, 7","9, 7, 5","7, 5, 9"],a:2},
{t:"TR",q:"Circular list traversal with do-while: head→[1]→[2]→[3]→(back to 1).<pre class='q-code'>temp = head\ndo {\n   Print(temp.data)\n   temp = temp.next\n} while (temp != head)</pre>Output is:",
 o:["1  2  3","2  3  1","1  2  3  1","3  2  1"],a:0},
{t:"TR",q:"List: head→[X]→null. First insert at top: data=Y → Y,X. Then insert at top: data=Z → Z,Y,X. Final order from head?",
 o:["X, Y, Z","Z, Y, X","Y, Z, X","Z, X, Y"],a:1},
{t:"TR",q:"List head→[3]→[1]→[4]→[1]→[5]→null. Count nodes:<pre class='q-code'>temp=head; count=0\nWhile(temp!=null)\n   count++\n   temp=temp.next\nPrint(count)</pre>Output:",
 o:["3","4","5","0"],a:2},
{t:"TR",q:"Delete from middle of head→[4]→[17]→[42]→null (delete 17). Pseudocode: <code>prev.next=temp.next; free(temp)</code>. After deletion, what is head.next.data?",
 o:["17","null","42","4"],a:2},
{t:"TR",q:"List head→[1]→[2]→[3]→[4]→[5]→null. Traverse:<pre class='q-code'>temp = head\nWhile (temp.next != null)\n   temp = temp.next\nPrint(temp.data)</pre>Output:",
 o:["1","3","5","4"],a:2},
{t:"TR",q:"Circular list: head→[10]→[20]→[30]→(back to head). Starting at head, after <strong>3</strong> moves of <code>temp=temp.next</code>, temp.data = ?",
 o:["20","30","10","null"],a:2},
{t:"TR",q:"List: head→[A]→[B]→[C]→null. Execute:<pre class='q-code'>temp = head\nWhile (temp != null)\n   prev = temp\n   temp = temp.next</pre>After the loop exits, what is <strong>prev.data</strong> and what is <strong>temp</strong>?",
 o:["prev=B, temp=C","prev=C, temp=null","prev=null, temp=A","prev=A, temp=null"],a:1},

// ── CHOOSE CORRECT CODE (25) ─────────────────────────────────────────
{t:"C",q:"Which pseudocode correctly traverses a singly linked list and <strong>visits all nodes</strong> including the last?",
 o:["temp=head; while(temp!=null){ print(temp.data); temp=temp.next }",
    "temp=head; while(temp.next!=null){ print(temp.data); temp=temp.next }",
    "temp=head; while(temp!=head){ print(temp.data); temp=temp.next }",
    "temp=null; while(temp!=head){ print(temp.data); temp=temp.next }"],a:0},
{t:"C",q:"Which pseudocode correctly inserts a new node at the <strong>TOP</strong> of a linked list?",
 o:["head=new; new.next=head",
    "new.next=head; head=new",
    "head=new; new.next=null",
    "new.next=null; head=new"],a:1},
{t:"C",q:"Which pseudocode correctly deletes the <strong>first node</strong> of a linked list?",
 o:["free(head); head=head.next",
    "temp=head; head=temp.next; free(temp)",
    "temp=head.next; free(head)",
    "head=null; free(head)"],a:1},
{t:"C",q:"To traverse and reach the <strong>LAST node</strong> (for end-deletion or end-insertion), the correct loop condition is:",
 o:["while(temp != null)","while(temp.next != null)","while(temp.data != null)","while(temp != head)"],a:1},
{t:"C",q:"Which correctly inserts a new node at the <strong>END</strong> of a linked list?",
 o:["temp=head; while(temp!=null){temp=temp.next}; temp=new; new.next=null",
    "temp=head; while(temp.next!=null){temp=temp.next}; temp.next=new; new.next=null",
    "temp=head; while(temp.next!=null){temp=temp.next}; temp=new",
    "temp=head; while(temp!=null){temp=temp.next}; temp.next=new"],a:1},
{t:"C",q:"For deletion from the <strong>middle</strong>, which order of operations is correct?",
 o:["free(temp); prev.next=temp.next",
    "prev.next=temp.next; free(temp)",
    "temp.next=null; free(temp)",
    "prev=temp.next; free(temp)"],a:1},
{t:"C",q:"Which correctly creates the <strong>first node</strong> in an initially empty linked list?",
 o:["head=null; new.data=x; head=new",
    "new.data=x; new.next=null; head=new",
    "head=new; new.data=x; new.next=head",
    "new=head; head.data=x"],a:1},

let cur=0, answers=new Array(Q.length).fill(-1), score=0;
const TYPE={
  T:{label:"Theoretical",cls:"badge-T"},
  TR:{label:"Tracing",cls:"badge-TR"},
  C:{label:"Choose Code",cls:"badge-C"},
  TT:{label:"Tricky Trace",cls:"badge-TT"},
};

function render(){
  const qz=document.getElementById('quiz');
  qz.style.display='block';
  document.getElementById('results').style.display='none';
  const q=Q[cur], answered=answers[cur]!==-1, userAns=answers[cur];
  const tc=TYPE[q.t];
  document.getElementById('prog').style.width=((cur+1)/Q.length*100)+'%';
  document.getElementById('counter').textContent=`${cur+1} / ${Q.length}`;
  document.getElementById('scoreDisplay').textContent=score;
  const letters=['A','B','C','D'];
  let optsHtml='';
  q.o.forEach((opt,i)=>{
    let cls='opt'+(answered?' disabled':'');
    if(answered){
      if(i===q.a) cls+=' correct';
      else if(i===userAns&&userAns!==q.a) cls+=' wrong';
    }
    const hasCode=opt.includes('\n')||opt.startsWith('temp=')||opt.startsWith('new.')||
                  opt.startsWith('head=')||opt.startsWith('free(')||opt.startsWith('while(')||
                  opt.startsWith('Step')||opt.includes('=head')||opt.includes('.next');
    const content=hasCode?`<span class="opt-code">${opt}</span>`:opt;
    optsHtml+=`<button class="${cls}" onclick="pick(${i})"><span class="opt-letter">${letters[i]}</span>${content}</button>`;
  });
  const feedHtml=answered?`<div class="feedback ${userAns===q.a?'correct':'wrong'}" style="display:block">
    ${userAns===q.a?'✓ Correct!':`✗ Incorrect. Correct answer: <strong>${letters[q.a]}. ${q.o[q.a]}</strong>`}
  </div>`:`<div class="feedback"></div>`;
  qz.innerHTML=`<div class="q-card">
    <div class="q-meta"><span class="q-num">Q ${cur+1} of ${Q.length}</span>
    <span class="badge ${tc.cls}">${tc.label}</span></div>
    <div class="q-text">${q.q}</div>
    <div class="options">${optsHtml}</div>${feedHtml}
    <div class="nav">
      <button class="btn btn-ghost" onclick="prev()" ${cur===0?'disabled':''}>← Previous</button>
      ${cur===Q.length-1
        ?`<button class="btn btn-primary" onclick="showResults()" ${!answered?'disabled':''}>View Results →</button>`
        :`<button class="btn btn-primary" onclick="next()" ${!answered?'disabled':''}>Next →</button>`}
    </div></div>`;
}

function pick(idx){
  if(answers[cur]!==-1) return;
  answers[cur]=idx;
  if(idx===Q[cur].a) score++;
  document.getElementById('scoreDisplay').textContent=score;
  render();
}
function next(){if(cur<Q.length-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}

function showResults(){
  document.getElementById('quiz').style.display='none';
  const r=document.getElementById('results');
  r.style.display='block';
  const pct=Math.round(score/Q.length*100);
  document.getElementById('resPct').textContent=pct+'%';
  document.getElementById('resScore').textContent=`${score} / ${Q.length} correct`;
  let grade,msg,color;
  if(pct>=90){grade='A+';msg='Outstanding! Fully exam-ready.';color='#22d46b'}
  else if(pct>=80){grade='A';msg='Excellent work!';color='#22d46b'}
  else if(pct>=70){grade='B';msg='Good — review the tricky ones.';color='#00c3ff'}
  else if(pct>=60){grade='C';msg='Above average — more practice needed.';color='#f0c040'}
  else if(pct>=50){grade='D';msg='Needs significant practice.';color='#ff7043'}
  else{grade='F';msg='Go back and review Chapter 2!';color='#ff4e4e'}
  const gradeEl=document.getElementById('resGrade');
  gradeEl.textContent=grade; gradeEl.style.color=color;
  document.getElementById('resMsg').textContent=msg;
  const arc=document.getElementById('arcFill');
  arc.style.stroke=color;
  const circ=427.26;
  setTimeout(()=>{arc.style.strokeDashoffset=circ-(pct/100*circ);},100);
  const cats={T:{n:'Theoretical',c:'#34d399',tot:0,cor:0},
              TR:{n:'Tracing',c:'#fb923c',tot:0,cor:0},
              C:{n:'Choose Code',c:'#818cf8',tot:0,cor:0},
              TT:{n:'Tricky Trace',c:'#f472b6',tot:0,cor:0}};
  Q.forEach((q,i)=>{cats[q.t].tot++;if(answers[i]===q.a)cats[q.t].cor++;});
  let bd='';
  Object.values(cats).forEach(c=>{
    if(!c.tot) return;
    const p=Math.round(c.cor/c.tot*100);
    bd+=`<div class="cat-row">
      <span class="cat-name" style="color:${c.c}">${c.n}</span>
      <div class="cat-bar-wrap"><div class="cat-bar-fill" style="background:${c.c};width:0%" data-w="${p}%"></div></div>
      <span class="cat-score">${c.cor}/${c.tot}</span></div>`;
  });
  document.getElementById('catBreakdown').innerHTML=bd;
  setTimeout(()=>{document.querySelectorAll('.cat-bar-fill').forEach(b=>b.style.width=b.dataset.w);},200);
}

function restart(){
  cur=0;answers=new Array(Q.length).fill(-1);score=0;
  document.getElementById('results').style.display='none';
  render();
}
render();
</script>
